name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

  build:
    name: Build plugin
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: smeltry-headlamp-dist-${{ github.sha }}
          path: dist/main.js
          retention-days: 30

  dco:
    name: DCO check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on all commits in PR
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD="${{ github.event.pull_request.head.sha || github.sha }}"
          MISSING=$(git log "${BASE}..${HEAD}" --no-merges --format="%H" | while read sha; do
            if ! git log -1 --format="%B" "$sha" | grep -q "^Signed-off-by:"; then
              echo "  $sha $(git log -1 --format='%s' "$sha")"
            fi
          done)
          if [ -n "$MISSING" ]; then
            echo "The following commits are missing a Signed-off-by line:"
            echo "$MISSING"
            exit 1
          fi
          echo "All commits have a Signed-off-by line."
